name: Build and Release APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Build release APK
        run: gradle :app:assembleRelease

      - name: Align and sign APK
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          APK_UNSIGNED="app/build/outputs/apk/release/app-release-unsigned.apk"
          APK_ALIGNED="app/build/outputs/apk/release/app-release-aligned.apk"
          APK_SIGNED="app/build/outputs/apk/release/voxcall-release.apk"

          if [[ -n "${KEYSTORE_BASE64:-}" && -n "${KEYSTORE_PASSWORD:-}" && -n "${KEY_ALIAS:-}" && -n "${KEY_PASSWORD:-}" ]]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > release.keystore
          else
            echo "Signing secrets not configured. Generating temporary keystore for this build."
            keytool -genkeypair \
              -keystore release.keystore \
              -storepass android \
              -alias voxcall \
              -keypass android \
              -dname "CN=VoxCall, OU=Release, O=VoxCall, L=Unknown, S=Unknown, C=US" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 3650
            KEYSTORE_PASSWORD=android
            KEY_ALIAS=voxcall
            KEY_PASSWORD=android
          fi

          "$ANDROID_HOME"/build-tools/34.0.0/zipalign -p -f 4 "$APK_UNSIGNED" "$APK_ALIGNED"
          "$ANDROID_HOME"/build-tools/34.0.0/apksigner sign \
            --ks release.keystore \
            --ks-pass pass:"$KEYSTORE_PASSWORD" \
            --ks-key-alias "$KEY_ALIAS" \
            --key-pass pass:"$KEY_PASSWORD" \
            --out "$APK_SIGNED" \
            "$APK_ALIGNED"

          "$ANDROID_HOME"/build-tools/34.0.0/apksigner verify "$APK_SIGNED"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: voxcall-release-apk
          path: app/build/outputs/apk/release/voxcall-release.apk

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/voxcall-release.apk
          generate_release_notes: true
